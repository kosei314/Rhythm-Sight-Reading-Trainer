<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VexFlow Canvas 動作確認</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.3/build/cjs/vexflow.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        // VexFlowの各クラスを読み込み
        const { Renderer, Stave, StaveNote, Beam, Formatter } = Vex.Flow;

        // コンテナの取得
        const container = document.getElementById('canvas-container');

        // レンダラーをCanvasで初期化
        const renderer = new Renderer(container, Renderer.Backends.CANVAS);
        renderer.resize(500, 200);
        const context = renderer.getContext();

        // 楽譜の五線を作成
        const stave = new Stave(25, 40, 400);
        stave.addClef('treble').addTimeSignature('4/4');
        stave.setContext(context).draw();

        // 音符データ
        const notes = [
            new StaveNote({ keys: ['c/4'], duration: 'q' }),
            new StaveNote({ keys: ['d/4'], duration: '8' }),
            new StaveNote({ keys: ['e/4'], duration: '8' }),
            new StaveNote({ keys: ['f/4'], duration: 'q' })
        ];

        // 8分音符に連桁（ビーム）を適用
        const beam = new Beam(notes.slice(1, 3));

        // 楽譜に配置して描画
        Formatter.FormatAndDraw(context, stave, notes);
        beam.setContext(context).draw();

        console.log("Canvasへの描画が完了しました。");
    </script>
</body>
</html>
